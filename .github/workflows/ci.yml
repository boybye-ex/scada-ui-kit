name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # PyQt6's offscreen platform plugin still dynamically links against
      # xkbcommon, EGL, DBus, and the xcb stack. Ubuntu runners ship a minimal
      # base image that omits them, so `from PyQt6 import QtCore` aborts at
      # import time with `qt.qpa.plugin: Could not load the Qt platform plugin`.
      # Windows and macOS runners already include a working Qt runtime.
      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libfontconfig1

      - name: Install project with build + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build,test]"

      - name: Run test suite (pytest + pytest-qt, headless)
        env:
          # pytest-qt widgets need a platform plugin; offscreen works on every
          # runner without an X server install. Mirrors tests/conftest.py so
          # the env is explicit in CI logs too.
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest

      - name: Build sdist + wheel and run twine check
        run: python build_package.py

      - name: Upload distribution artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: scada-ui-kit-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14
